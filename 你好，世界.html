<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 让网页在手机上也能正常显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你好，世界！</title>
    <style>
        /* 页面基础样式：居中显示 */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
            font-family: "Microsoft YaHei", sans-serif;
        }
        /* 文字样式：大字体、可点击、鼠标悬浮效果 */
        .hello-text {
            font-size: 60px;
            font-weight: bold;
            color: #2d8cf0;
            cursor: pointer;
            transition: transform 0.3s, color 0.3s;
            text-decoration: none;
        }
        /* 鼠标悬浮时的动画效果 */
        .hello-text:hover {
            transform: scale(1.1);
            color: #165dff;
        }
    </style>
</head>
<body>
    <!-- 点击文字跳转到百度，_blank表示新标签页打开 -->
    <a href="https://www.baidu.com" target="_blank" class="hello-text">
        你好，世界！
    </a>
</body>
</html>
